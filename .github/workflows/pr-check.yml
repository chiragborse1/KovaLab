name: PR Check

on:
  pull_request:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      KOVA_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve changed base
        id: changed-base
        shell: bash
        run: |
          set -euo pipefail
          base_branch="${{ github.base_ref }}"
          git fetch --no-tags origin "${base_branch}:refs/remotes/origin/${base_branch}"
          base="origin/${base_branch}"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "Using changed base: ${base}"

      - name: Check changed lanes
        run: pnpm check:changed -- --base "${{ steps.changed-base.outputs.base }}" --head HEAD

      - name: Test changed targets
        env:
          KOVA_VITEST_MAX_WORKERS: "1"
        run: node scripts/test-projects.mjs --changed "${{ steps.changed-base.outputs.base }}"

      - name: Build runtime
        run: pnpm build

      - name: Build Control UI
        run: pnpm ui:build
