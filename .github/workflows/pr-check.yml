name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Detect optional scripts
        id: scripts
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const scripts = require("./package.json").scripts || {};
          console.log(`has_lint=${Boolean(scripts.lint)}`);
          console.log(`has_tsgo=${Boolean(scripts.tsgo)}`);
          console.log(`has_check_test_types=${Boolean(scripts["check:test-types"])}`);
          NODE

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run lint
        if: steps.scripts.outputs.has_lint == 'true'
        run: pnpm lint

      - name: Run type check
        if: steps.scripts.outputs.has_tsgo == 'true'
        run: pnpm tsgo

      - name: Run fallback type check
        if: steps.scripts.outputs.has_tsgo != 'true' && steps.scripts.outputs.has_check_test_types == 'true'
        run: pnpm check:test-types
