name: Kova NPM Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NODE_VERSION: "24.x"
  PNPM_VERSION: "10.33.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Validate tag, package name, and version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [[ "$PACKAGE_NAME" != "getkova" ]]; then
            echo "package.json name must be getkova; found $PACKAGE_NAME" >&2
            exit 1
          fi

          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "tag version $VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime
        run: pnpm build

      - name: Build Control UI
        run: pnpm ui:build

      - name: Preview published package
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
