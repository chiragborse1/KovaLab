name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  KOVA_LOCAL_CHECK: "0"

jobs:
  resolve-changed-base:
    name: Resolve changed base
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.changed-base.outputs.base }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve changed base
        id: changed-base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_branch="${{ github.base_ref }}"
            git fetch --no-tags origin "${base_branch}:refs/remotes/origin/${base_branch}"
            base="origin/${base_branch}"
          else
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${before}^{commit}" 2>/dev/null; then
              base="$before"
            elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base="HEAD^"
            else
              base="HEAD"
            fi
          fi
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "Using changed base: ${base}"

  check-changed-lanes:
    name: Check changed lanes
    runs-on: ubuntu-latest
    needs: resolve-changed-base
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changed lanes
        run: pnpm check:changed -- --base "${{ needs.resolve-changed-base.outputs.base }}" --head HEAD

  test-changed-targets:
    name: Test changed targets (${{ matrix.shard_label }})
    runs-on: ubuntu-latest
    needs: resolve-changed-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_label: "1/4"
          - shard_index: 1
            shard_label: "2/4"
          - shard_index: 2
            shard_label: "3/4"
          - shard_index: 3
            shard_label: "4/4"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test changed targets
        env:
          KOVA_VITEST_MAX_WORKERS: "1"
          KOVA_VITEST_NO_OUTPUT_TIMEOUT_MS: "600000"
          KOVA_TEST_PROJECTS_SHARD_INDEX: ${{ matrix.shard_index }}
          KOVA_TEST_PROJECTS_SHARD_TOTAL: "4"
        run: node scripts/test-projects.mjs --changed "${{ needs.resolve-changed-base.outputs.base }}"

  build-runtime:
    name: Build runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime
        run: pnpm build

  build-control-ui:
    name: Build Control UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Control UI
        run: pnpm ui:build
