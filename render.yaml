services:
  - type: web
    name: kova
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: KOVA_GATEWAY_PORT
        value: "8080"
      - key: KOVA_STATE_DIR
        value: /data/.kova
      - key: KOVA_WORKSPACE_DIR
        value: /data/workspace
      - key: KOVA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: kova-data
      mountPath: /data
      sizeGB: 1
